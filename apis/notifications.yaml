openapi: 3.0.0

info:
  title: Notifications Dynamic API
  description: |
    API encargada de gestionar el **envío de notificaciones dinámicas** a clientes.

    Esta API permite:

    - Crear campañas de notificación
    - Consultar el estado de las notificaciones
    - Obtener detalles del flujo de mensajería
    - Gestionar reintentos de envío

    ## Flujo general

    1. Se crea una campaña de notificación.
    2. Se registran los destinos (clientes).
    3. El sistema envía las notificaciones.
    4. Se puede consultar el estado de cada envío.

  version: 1.0.0
  contact:
    name: Equipo de Integraciones
    email: soporte@empresa.com

servers:
  - url: https://api.empresa.com/v1
    description: Producción

  - url: https://sandbox.empresa.com/v1
    description: Sandbox

tags:
  - name: Notifications
    description: Operaciones relacionadas con notificaciones dinámicas

paths:

  /notifications:
    post:
      tags:
        - Notifications
      summary: Crear campaña de notificaciones
      description: |
        Permite registrar una **campaña de notificaciones dinámicas**.

        La campaña incluirá una lista de destinatarios y los datos necesarios
        para iniciar el flujo de notificación.

      requestBody:
        required: true
        content:
          application/json:
            example:
              campaignId: CAMPAIGN001
              schedulerDate: "2026-03-13T10:00:00"
              frecuencyResends: 3
              periodResends: 24
              destinations:
                - destination: "3001234567"
                  clientIdentification: "123456"
                  clientCode: "CLI001"
                  email: "cliente@email.com"

      responses:

        '200':
          description: Campaña registrada correctamente
          content:
            application/json:
              example:
                status: success
                message: Campaign created successfully
                data:
                  campaignId: CAMPAIGN001

        '400':
          description: Error en la solicitud

        '500':
          description: Error interno del servidor

  /notifications/{campaignId}:
    get:
      tags:
        - Notifications
      summary: Consultar estado de campaña
      description: |
        Permite obtener el estado de una campaña de notificaciones
        junto con los detalles de cada destinatario.

      parameters:
        - name: campaignId
          in: path
          required: true
          schema:
            type: string
          description: Identificador de la campaña

      responses:
        '200':
          description: Información de la campaña
          content:
            application/json:
              example:
                campaignId: CAMPAIGN001
                status: COMPLETED
                destinations:
                  - destination: "3001234567"
                    status: SENT
