asyncapi: 2.6.0
info:
  title: Notification Massive API
  version: 1.0.0
  description: |
    API para gestionar campañas de notificaciones masivas y consultar el estado de las notificaciones enviadas.

servers:
  production:
    url: https://tigo.com.co
    protocol: https
    description: Servidor productivo

channels:

  /api/outbound/colombia/outboundmassive:
    description: Servicio para programar envíos masivos de notificaciones
    publish:
      summary: Programar campaña de notificaciones
      operationId: scheduleMassiveNotification
      bindings:
        http:
          type: request
          method: POST
          headers:
            type: object
            properties:
              x-access-key:
                type: string
                example: S7uK238FXIbHdaghd0LuT2ZfdA
      message:
        $ref: '#/components/messages/OutboundMassiveRequest'

  /api/colombia/getreportnotificationmassive:
    description: Obtener reporte de campañas y estado de notificaciones
    subscribe:
      summary: Consultar estado de campaña
      operationId: getReportNotificationMassive
      bindings:
        http:
          type: request
          method: GET
          headers:
            type: object
            properties:
              x-access-key:
                type: string
                example: S7uK238FXIbHdaghd0LuT2ZfdAS
      message:
        $ref: '#/components/messages/GetReportNotificationRequest'

components:

  messages:

    OutboundMassiveRequest:
      name: OutboundMassiveRequest
      title: Programación de campaña masiva
      payload:
        type: object
        properties:
          campaignId:
            type: string
            description: Id de la campaña
            example: "5865"

          schedulerDate:
            type: string
            description: Fecha programada de envío
            example: "2025-06-20 10:30:00"

          template:
            type: string
            description: Nombre de la plantilla
            example: descuentos

          resendPolicies:
            $ref: '#/components/schemas/ResendPolicies'

          destinations:
            type: array
            items:
              $ref: '#/components/schemas/Destination'

    GetReportNotificationRequest:
      name: GetReportNotificationRequest
      title: Consulta de reporte de notificaciones
      payload:
        type: object
        properties:
          campaignId:
            type: string
            description: Id de la campaña
            example: "3565"

          startDate:
            type: string
            description: Fecha inicio filtro
            example: "2025-06-01 07:00:00"

          endDate:
            type: string
            description: Fecha fin filtro
            example: "2025-06-30 18:00:00"

  schemas:

    ResendPolicies:
      type: object
      properties:
        frecuencyResends:
          type: integer
          description: Máximo de reenvíos por destinatario
          example: 3

        periodResends:
          type: integer
          description: Intervalo de reenvío en horas
          example: 48

        response:
          type: array
          description: Estados que activan reenvío
          items:
            type: string
            enum:
              - un_read
              - un_response
              - no_complete

    Destination:
      type: object
      properties:

        destination:
          type: string
          description: Celular del destinatario con indicativo
          example: "57304544553"

        clientIdentification:
          type: string
          description: Documento del cliente
          example: "73557001"

        clientCode:
          type: string
          description: Código del cliente
          example: "0001001832"

        addresCode:
          type: string
          description: Código de dirección
          example: "0002300479"

        email:
          type: string
          description: Correo de notificación
          example: test@gmail.com

        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'

        parameters:
          type: array
          items:
            type: string
          example:
            - "blanco 42 Kilos"
            - "9%"

    Product:
      type: object
      properties:
        productCode:
          type: string
          example: "4618089"

        ammount:
          type: integer
          example: 8
