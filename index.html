<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal de APIs</title>

<style>
body{
    font-family: Arial;
    background:#f5f5f5;
    margin:40px;
}

h1{
    text-align:center;
}

.api-card{
    background:white;
    border-radius:8px;
    padding:20px;
    margin:20px auto;
    width:600px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.api-card h2{
    margin-top:0;
}

.btn{
    display:inline-block;
    padding:10px 15px;
    background:#0078D4;
    color:white;
    text-decoration:none;
    border-radius:4px;
}
</style>

</head>

<body>

<h1>Portal de Documentación de APIs</h1>

<div class="api-card">
    <h2>Notifications API</h2>
    <p>
        API encargada de gestionar el envío de notificaciones dinámicas,
        campañas y estados de mensajes.
    </p>

    <a class="btn"
       href="swagger.html?url=./apis/notifications.yaml">
       Ver documentación
    </a>
</div>

<div class="api-card">
    <h2>Users API</h2>
    <p>
        API encargada de la gestión de usuarios, autenticación y perfiles.
    </p>

    <a class="btn"
       href="swagger.html?url=./apis/users.yaml">
       Ver documentación
    </a>
</div>

</body>
</html>
